basePath: /api
definitions:
  models.Ingredient:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      unit:
        description: kg, litros, unidades, etc.
        type: string
      unit_cost:
        type: number
      updated_at:
        type: string
    type: object
  models.Machine:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.OperationalResource:
    properties:
      available:
        description: DISP(R)
        type: number
      cost_per_unit:
        description: CR(R)
        type: number
      id:
        type: integer
      name:
        type: string
      resource_id:
        type: integer
    type: object
  models.Optimization:
    properties:
      created_at:
        type: string
      finished_at:
        type: string
      id:
        type: integer
      job_id:
        type: string
      max_production:
        description: M
        type: number
      min_variety:
        description: PRO
        type: integer
      resource:
        $ref: '#/definitions/models.Resource'
      resource_id:
        type: integer
      results:
        items:
          $ref: '#/definitions/models.OptimizationResult'
        type: array
      started_at:
        type: string
      status:
        $ref: '#/definitions/models.OptimizationStatus'
      stock:
        $ref: '#/definitions/models.Stock'
      stock_id:
        type: integer
      total_profit:
        type: number
    type: object
  models.OptimizationResult:
    properties:
      batch_active:
        description: Y(I)
        type: number
      expected_profit:
        type: number
      id:
        type: integer
      optimization_id:
        type: integer
      product:
        $ref: '#/definitions/models.Product'
      product_id:
        type: integer
      quantity_to_produce:
        description: X(I)
        type: number
      variety_flag:
        description: W(I)
        type: number
    type: object
  models.OptimizationStatus:
    enum:
    - pending
    - processing
    - done
    - error
    - cancelled
    type: string
    x-enum-varnames:
    - StatusPending
    - StatusProcessing
    - StatusDone
    - StatusError
    - StatusCancelled
  models.Product:
    properties:
      created_at:
        type: string
      demand:
        type: number
      id:
        type: integer
      ingredients:
        items:
          $ref: '#/definitions/models.ProductIngredient'
        type: array
      machines:
        items:
          $ref: '#/definitions/models.ProductMachine'
        type: array
      max_batch:
        type: number
      min_batch:
        type: number
      name:
        type: string
      operational_resources:
        items:
          $ref: '#/definitions/models.ProductOperationalResource'
        type: array
      sale_price:
        type: number
      updated_at:
        type: string
    type: object
  models.ProductIngredient:
    properties:
      id:
        type: integer
      ingredient:
        $ref: '#/definitions/models.Ingredient'
      ingredient_id:
        type: integer
      product_id:
        type: integer
      quantity:
        type: number
    type: object
  models.ProductMachine:
    properties:
      id:
        type: integer
      machine:
        $ref: '#/definitions/models.Machine'
      machine_id:
        type: integer
      minutes_per_unit:
        type: number
      product_id:
        type: integer
    type: object
  models.ProductOperationalResource:
    properties:
      consumption_per_batch:
        description: CM(I,R)
        type: number
      id:
        type: integer
      operational_resource:
        $ref: '#/definitions/models.OperationalResource'
      operational_resource_id:
        type: integer
      product_id:
        type: integer
    type: object
  models.Resource:
    properties:
      created_at:
        type: string
      id:
        type: integer
      machines:
        items:
          $ref: '#/definitions/models.ResourceMachine'
        type: array
      name:
        type: string
      operational_resources:
        items:
          $ref: '#/definitions/models.OperationalResource'
        type: array
      updated_at:
        type: string
    type: object
  models.ResourceMachine:
    properties:
      hours_available:
        type: number
      id:
        type: integer
      machine:
        $ref: '#/definitions/models.Machine'
      machine_id:
        type: integer
      resource_id:
        type: integer
    type: object
  models.Stock:
    properties:
      created_at:
        type: string
      id:
        type: integer
      ingredients:
        items:
          $ref: '#/definitions/models.StockIngredient'
        type: array
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.StockIngredient:
    properties:
      id:
        type: integer
      ingredient:
        $ref: '#/definitions/models.Ingredient'
      ingredient_id:
        type: integer
      quantity_available:
        type: number
      stock_id:
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    name: Soporte Técnico
  description: Backend para la optimización de producción de una panadería usando
    LINGO.
  title: LINGO Bakery API
  version: "1.0"
paths:
  /ingredients:
    get:
      description: Obtiene la lista completa de ingredientes registrados en el sistema
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Ingredient'
            type: array
      summary: Listar ingredientes
      tags:
      - Ingredients
    post:
      consumes:
      - application/json
      description: Registra un nuevo insumo básico en el sistema
      parameters:
      - description: Datos del ingrediente
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.Ingredient'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Ingredient'
      summary: Crear ingrediente
      tags:
      - Ingredients
  /ingredients/{id}:
    get:
      description: Obtiene los detalles de un ingrediente específico
      parameters:
      - description: ID del ingrediente
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Ingredient'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Obtener ingrediente
      tags:
      - Ingredients
  /optimize:
    post:
      consumes:
      - application/json
      description: Encola un nuevo trabajo para que LINGO calcule la producción óptima
      parameters:
      - description: IDs de Stock y Recursos
        in: body
        name: output
        required: true
        schema:
          $ref: '#/definitions/models.Optimization'
      produces:
      - application/json
      responses:
        "202":
          description: job_id, status
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Iniciar optimización
      tags:
      - Optimization
  /optimize/{job_id}:
    get:
      description: Obtiene el estado (pending, processing, done, error) de un trabajo
        por su UUID y su ID de base de datos
      parameters:
      - description: UUID del trabajo
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: job_id, status, id
          schema:
            additionalProperties: true
            type: object
      summary: Consultar estado de Job
      tags:
      - Optimization
  /products:
    get:
      description: Obtiene la lista completa de productos con sus precios y costos
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Product'
            type: array
      summary: Listar productos
      tags:
      - Products
    post:
      consumes:
      - application/json
      description: Registra un nuevo producto en el catálogo
      parameters:
      - description: Datos del producto
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.Product'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Product'
      summary: Crear producto
      tags:
      - Products
  /products/{id}:
    get:
      description: Obtiene detalles de un producto, incluyendo ingredientes y máquinas
        asignadas
      parameters:
      - description: ID del producto
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Product'
      summary: Obtener producto
      tags:
      - Products
  /results/{id}:
    get:
      description: Obtiene las cantidades óptimas a producir y ganancias esperadas
      parameters:
      - description: ID de la optimización (Postgres)
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Optimization'
      summary: Obtener resultados de optimización
      tags:
      - Optimization
swagger: "2.0"
